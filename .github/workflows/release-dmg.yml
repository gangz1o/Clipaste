name: Release DMG

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release-dmg:
    runs-on: macos-26
    env:
      APP_NAME: Clipaste
      SCHEME: Clipaste
      PROJECT_PATH: clipaste.xcodeproj
      INFO_PLIST_PATH: clipaste-Info.plist
      XCODE_VERSION: '26.4.1'
      XCODE_BUILD_VERSION: '17E202'
      EXPECTED_APP_SDK_VERSION: '26.4'
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      HOMEBREW_TAP_REPOSITORY: gangz1o/homebrew-clipaste

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build signed and notarized DMG
        run: |
          chmod +x scripts/build-release-dmg.sh
          scripts/build-release-dmg.sh

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" build/release/*.dmg build/release/*.sha256 build/release/*.zip --clobber

      - name: Publish Sparkle Feed
        timeout-minutes: 10
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES_MARKDOWN: ${{ github.event.release.body }}
        run: |
          if [ -z "${RELEASE_NOTES_MARKDOWN}" ]; then
            RELEASE_NOTES_MARKDOWN="$(gh release view "$RELEASE_TAG" --json body --jq .body)"
            export RELEASE_NOTES_MARKDOWN
          fi

          chmod +x scripts/publish-sparkle-feed.sh
          scripts/publish-sparkle-feed.sh

      - name: Update Homebrew Tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is not configured. Skipping tap update."
            exit 0
          fi

          chmod +x scripts/update-homebrew-tap.sh
          scripts/update-homebrew-tap.sh
